<!DOCTYPE html>
<html lang="es">
  <head>
    <title>Don Nadie</title>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <link
      rel="stylesheet"
      href="https://unicons.iconscout.com/release/v2.1.9/css/unicons.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="css/diseño.css" />
  </head>
  <body>
    <div class="section">
      <div class="container">
        <div class="row full-height justify-content-center">
          <div class="col-12 text-center align-self-center py-5">
            <div class="section pb-5 pt-5 pt-sm-2 text-center">
              <h6 class="mb-0 pb-3">
                <span>Iniciar Sesión </span><span>Registrarse</span>
              </h6>
              <input
                class="checkbox"
                type="checkbox"
                id="reg-log"
                name="reg-log"
              />
              <label for="reg-log"></label>
              <div class="card-3d-wrap mx-auto">
                <div class="card-3d-wrapper">
                  <!-- Iniciar Sesión -->
                  <div class="card-front">
                    <div class="center-wrap">
                      <div class="section text-center">
                        <h4 class="pb-3">Iniciar Sesión</h4>
                        <form id="login-form" novalidate>
                          <div class="form-group">
                            <label for="login-email" class="visually-hidden"
                              >Correo Electrónico</label
                            >
                            <input
                              type="email"
                              class="form-style"
                              id="login-email"
                              name="email"
                              placeholder="Correo Electrónico"
                              required
                            />
                            <i class="input-icon uil uil-at"></i>
                          </div>
                          <div class="form-group mt-2">
                            <label
                              for="login-password"
                              class="visually-hidden"
                              >Contraseña</label
                            >
                            <input
                              type="password"
                              class="form-style"
                              id="login-password"
                              name="password"
                              placeholder="Contraseña"
                              required
                            />
                            <i class="input-icon uil uil-lock-alt"></i>
                          </div>
                          <button type="submit" class="btn mt-4">
                            Iniciar Sesión
                          </button>
                        </form>
                        <div class="form-group mt-2">
                          <p>
                            O
                          </p>
                          <a href="#" class="btn"><i class="fa-brands fa-facebook-f"></i></a>
                          <a href="#" class="btn"><i class="fa-brands fa-google"></i></a>
                          <a href="#" class="btn"><i class="fa-brands fa-github"></i></a>
                        </div>
                        <p class="mb-0 mt-4 text-center">
                          <a
                            href="ResetPasword.html"
                            target="_blank"
                            class="link"
                            >¿Olvidaste tu contraseña?</a
                          >
                        </p>
                      </div>
                    </div>
                  </div>
                  <!-- Registrarse -->
                  <div class="card-back">
                    <div class="center-wrap">
                      <div class="section text-center">
                        <h4 class="mb-3 pb-3">Registrarse</h4>
                        <form id="register-form" novalidate>
                          <div class="form-group">
                            <label for="register-name" class="visually-hidden"
                              >Nombre Completo</label
                            >
                            <input
                              type="text"
                              class="form-style"
                              id="register-name"
                              name="name"
                              placeholder="Nombre Completo"
                              required
                            />
                            <i class="input-icon uil uil-user"></i>
                          </div>
                          <div class="form-group mt-2">
                            <label for="register-phone" class="visually-hidden"
                              >Número de Teléfono</label
                            >
                            <input
                              type="tel"
                              class="form-style"
                              id="register-phone"
                              name="phone"
                              placeholder="Número de Teléfono"
                              pattern="[0-9]{10}"
                              required
                            />
                            <i class="input-icon uil uil-phone"></i>
                          </div>
                          <div class="form-group mt-2">
                            <label for="register-email" class="visually-hidden"
                              >Correo Electrónico</label
                            >
                            <input
                              type="email"
                              class="form-style"
                              id="register-email"
                              name="email"
                              placeholder="Correo Electrónico"
                              required
                            />
                            <i class="input-icon uil uil-at"></i>
                          </div>
                          <div class="form-group mt-2">
                            <label
                              for="register-password"
                              class="visually-hidden"
                              >Contraseña</label
                            >
                            <input
                              type="password"
                              class="form-style"
                              id="register-password"
                              name="password"
                              placeholder="Contraseña"
                              minlength="8"
                              required
                            />
                            <i class="input-icon uil uil-lock-alt"></i>
                          </div>
                          <button type="submit" class="btn mt-4">
                            Registrarse
                          </button>
                        </form>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      // Validación del formulario de inicio de sesión
      document.getElementById('login-form').addEventListener('submit', function (e) {
        e.preventDefault();
        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value.trim();

        if (email && password) {
          alert('Inicio de sesión exitoso.');
        } else {
          alert('Por favor, completa todos los campos.');
        }
      });

      // Validación del formulario de registro
      document.getElementById('register-form').addEventListener('submit', function (e) {
        e.preventDefault();
        const name = document.getElementById('register-name').value.trim();
        const phone = document.getElementById('register-phone').value.trim();
        const email = document.getElementById('register-email').value.trim();
        const password = document.getElementById('register-password').value.trim();

        if (name && phone && email && password) {
          alert('Registro exitoso.');
        } else {
          alert('Por favor, completa todos los campos.');
        }
      });
    </script>
  </body>
</html>
