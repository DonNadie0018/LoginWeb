<!DOCTYPE html>
<html lang="es">
  <head>
    <title>Recuperar Contraseña</title>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <link
      rel="stylesheet"
      href="https://unicons.iconscout.com/release/v2.1.9/css/unicons.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="css/diseño.css" />
    <style>
      .message {
        display: none;
        margin-top: 15px;
        /*font-size: 0.9rem;*/
      }
      .message.success {
        color: green;
      }
      .message.error {
        color: red;
      }
    </style>
  </head>
  <body>
    <div class="section">
      <div class="container">
        <div class="row full-height justify-content-center">
          <div class="col-12 text-center align-self-center py-5">
            <div class="section pb-5 pt-5 pt-sm-2 text-center">
              <div class="card-3d-wrap mx-auto">
                <div class="card-3d-wrapper">
                  <div class="card-front">
                    <div class="center-wrap">
                      <div class="section text-center">
                        <h4 class="pb-3">Recuperar Contraseña</h4>
                        <p class="mb-4">
                          Ingresa tu correo electrónico y te enviaremos un enlace
                          para restablecer tu contraseña.
                        </p>
                        <form id="recovery-form">
                          <div class="form-group">
                            <label for="recovery-email" class="visually-hidden">Correo Electrónico</label>
                            <input
                              type="email"
                              class="form-style"
                              id="recovery-email"
                              name="email"
                              placeholder="Correo Electrónico"
                              required
                              aria-label="Correo Electrónico"
                            />
                            <i class="input-icon uil uil-at"></i>
                          </div>
                          <button type="submit" class="btn mt-4">
                            Enviar Enlace
                          </button>
                        </form>
                        <p class="message success" id="success-message">
                          El enlace de recuperación se ha enviado a tu correo.
                        </p>
                        <p class="message error" id="error-message">
                          Por favor, ingresa un correo válido.
                        </p>
                        <p class="mb-0 mt-4 text-center">
                          <a href="Login.html" class="link"
                            >Volver a Iniciar Sesión</a
                          >
                        </p>
                      </div>
                    </div>
                  </div>
                  <div class="card-back"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const form = document.getElementById('recovery-form');
      const emailInput = document.getElementById('recovery-email');
      const successMessage = document.getElementById('success-message');
      const errorMessage = document.getElementById('error-message');

      form.addEventListener('submit', function (event) {
        event.preventDefault(); // Prevenir el envío automático

        const email = emailInput.value.trim(); 

        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (emailRegex.test(email)) {
          successMessage.style.display = 'block';
          errorMessage.style.display = 'none';

          setTimeout(() => {
            alert('Enlace enviado a ' + email);
          }, 1000);
        } else {
          successMessage.style.display = 'none';
          errorMessage.style.display = 'block';
        }
      });
    </script>
  </body>
</html>
